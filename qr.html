<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>琉球の風 2026 入場QRコード</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: #f1f5f9; padding: 20px 10px; color: #1e293b; }
    .container { max-width: 450px; margin: 0 auto; }
    .qr-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
    h1 { font-size: 1.2rem; margin-bottom: 10px; color: #1e3a8a; }
    .ticket-label { font-size: 0.8rem; font-weight: bold; background: #1e3a8a; color: white; padding: 4px 12px; border-radius: 50px; display: inline-block; margin-bottom: 10px; }
    .qr-image { margin: 10px 0; border: 4px solid #fff; width: 220px; height: 220px; }
    .info { font-size: 0.85rem; margin-top: 10px; text-align: left; background: #f8fafc; padding: 12px; border-radius: 10px; line-height: 1.5; }
    .warning { font-size: 0.8rem; color: #ef4444; margin: 20px 0; font-weight: bold; }
    #status-msg { padding: 40px; font-weight: bold; color: #64748b; background: white; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
  </style>
</head>
<body>
  <div class="container">
    <h1>琉球の風 2026<br>入場用QRコード</h1>
    <div id="status-msg">チケット情報を読み込み中...</div>
    <div id="qr-list"></div>
    <p class="warning">※当日、受付にてこの画面をご提示ください。</p>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbznb1pfd74mU8lH-oVrKbJNg935KAPPtIjmGwMsuB3Zv5PoZwbRuH3rJcgj_ZhEDCy1PQ/exec";

    const orderId = new URLSearchParams(window.location.search).get('id');

    async function loadTickets() {
      const msgEl = document.getElementById('status-msg');
      if (!orderId) {
        msgEl.innerHTML = '<span style="color:red;">エラー: IDが不明です</span>';
        return;
      }

      try {
        const response = await fetch(`${GAS_URL}?type=getOrder&id=${orderId}`);
        const order = await response.json();
        
        if (!order || order.error) {
          msgEl.innerHTML = `エラー: 注文データが見つかりません (ID: ${orderId})`;
          return;
        }

        // 🌟 どんな名前（S大人 / s_a / Ｓ大人）で入っていても見つけ出す魔法の処理
        const findVal = (names) => {
          const key = Object.keys(order).find(k => names.includes(k.trim()));
          return key ? Number(order[key]) || 0 : 0;
        };

        const s_a = findVal(["S大人", "s_a", "Ｓ大人"]);
        const s_c = findVal(["S子供", "s_c", "Ｓ子供"]);
        const g_a = findVal(["一般大人", "g_a", "一般大人"]);
        const g_c = findVal(["一般子供", "g_c", "一般子供"]);
        
        const total = s_a + s_c + g_a + g_c;

        if (total === 0) {
          msgEl.innerHTML = `チケット枚数が0枚です。<br><small style="font-size:10px; color:#ccc;">(取得データ: ${JSON.stringify(order)})</small>`;
          return;
        }

        msgEl.style.display = 'none';
        const qrList = document.getElementById('qr-list');

        for (let i = 1; i <= total; i++) {
          const branchId = `${orderId}-${i}`;
          // 🌟 ここから：現在のチケット(i枚目)がどの券種か判定する
          let ticketType = "不明な券種";
          if (i <= s_a) {
            ticketType = "【Sエリア】 大人";
          } else if (i <= s_a + s_c) {
            ticketType = "【Sエリア】 子供";
          } else if (i <= s_a + s_c + g_a) {
            ticketType = "【一般エリア】 大人";
          } else {
            ticketType = "【一般エリア】 子供";
          }
          // 🌟 ここまで判定ロジック
          const card = document.createElement('div');
          card.className = 'qr-card';
          card.innerHTML = `
            <div class="ticket-label">チケット ${i} / ${total}</div>
            <div><img class="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${branchId}"></div>
            <div class="info">
              <div style="font-size: 1.4em; font-weight: bold; color: #d32f2f; margin-bottom: 8px;">
                ${ticketType}
              </div>
              <strong>受付番号:</strong> ${branchId}
            </div>
          `;
          qrList.appendChild(card);
        }
      } catch (e) {
        msgEl.innerHTML = `通信エラーが発生しました。<br><small>${e.message}</small>`;
      }
    }
    loadTickets();
  </script>
</body>
</html>
